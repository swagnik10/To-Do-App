apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1

  selector:
    matchLabels:
      app: ollama

  template:
    metadata:
      labels:
        app: ollama

    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest

          ports:
            - containerPort: 11434

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama

      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc