apiVersion: batch/v1
kind: Job

metadata:
  name: db-init
  namespace: todo-app

spec:
  backoffLimit: 3

  template:
    spec:
      restartPolicy: Never

      containers:
        - name: db-init

          image: swagnik10/todo-db-init:v1

          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: SA_PASSWORD